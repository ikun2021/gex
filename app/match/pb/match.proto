syntax = "proto3";
package match;
option go_package = "./pb";

message GetDepthReq{
  //交易对
  string symbol=1;
  //档位
  int32  level =2;
}
message GetDepthResp{
  //订单簿版本
  int64 version=1;
  message Position{
    //数量
    string base_amount=1;
    //价格
    string price=2;
    //金额
    string quote_amount=3;
  }
  //卖盘
  repeated  Position asks=2;
  //买盘
  repeated  Position bids=3;
}

service MatchService {
  //获取深度
  rpc GetDepth(GetDepthReq)returns(GetDepthResp);
}